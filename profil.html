  <style>
    :root { --bg:#0d0f1a; --surface:#131629; --border:rgba(255,255,255,0.08); --accent:#6c63ff; --accent2:#00d4ff; --text:#f0f0f8; --muted:rgba(240,240,248,0.4); }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Outfit',sans-serif; min-height:100vh; background:var(--bg); color:var(--text); display:flex; flex-direction:column; }
    /* SPINNER DE CHARGEMENT */
    .loading-overlay { position:fixed; inset:0; background:#0d0f1a; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; transition:opacity 0.4s ease; }

    /* NAV */

    .nav-logo-text { font-weight:800; font-size:1.1em; letter-spacing:-0.3px; }
    .nav-logo-text .pa{color:#3b82f6;} .nav-logo-text .ta{color:#22c55e;} .nav-logo-text .com{color:#eab308;} .nav-logo-text .pta{color:#ef4444;}
    .nav-back { display:flex; align-items:center; gap:6px; font-size:0.82em; font-weight:600; color:var(--muted); background:rgba(255,255,255,0.05); border:1px solid var(--border); padding:7px 14px; border-radius:8px; text-decoration:none; transition:all 0.2s; }
    .nav-back:hover { color:var(--text); background:rgba(255,255,255,0.09); }

    /* HERO PROFIL */
    .hero-profil { background:linear-gradient(160deg,#12162e 0%,#1a1f3a 60%,#0f1228 100%); border-bottom:1px solid var(--border); padding:32px 20px 28px; }
    .hero-inner { max-width:480px; margin:0 auto; display:flex; align-items:center; gap:18px; }
    .avatar-grand { width:64px; height:64px; border-radius:50%; background:linear-gradient(135deg,var(--accent),#8b83ff); display:flex; align-items:center; justify-content:center; font-size:1.6em; font-weight:800; color:white; flex-shrink:0; box-shadow:0 0 30px rgba(108,99,255,0.3); position:relative; cursor:pointer; overflow:hidden; }
    .avatar-grand img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
    .avatar-cam { position:absolute; bottom:-2px; right:-2px; width:24px; height:24px; border-radius:50%; background:#131629; border:2px solid #0d0f1a; display:flex; align-items:center; justify-content:center; font-size:0.7em; }
    .hero-info h1 { font-size:1.4em; font-weight:800; letter-spacing:-0.3px; }
    .hero-info .email { font-size:0.78em; color:var(--muted); margin-top:2px; font-family:'DM Mono',monospace; }
    .hero-info .membre { font-size:0.72em; color:rgba(108,99,255,0.7); margin-top:4px; }
    .badge-total { margin-top:12px; display:inline-flex; align-items:baseline; gap:6px; background:rgba(108,99,255,0.12); border:1px solid rgba(108,99,255,0.25); border-radius:12px; padding:8px 16px; }
    .badge-total .montant { font-size:2em; font-weight:800; color:var(--accent2); text-shadow:0 0 20px rgba(0,212,255,0.3); font-family:'DM Mono',monospace; }
    .badge-total .label { font-size:0.75em; color:var(--muted); }

    /* CONTENU */
    main { flex:1; padding:0 16px; max-width:480px; width:100%; margin:0 auto; }
    .section-titre { font-size:0.72em; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); margin-bottom:12px; padding-left:4px; margin-top:24px; }

    .stat-card { background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:14px; padding:14px 16px; }
    .stat-card .val { font-size:1.5em; font-weight:800; color:var(--text); }
    .stat-card .lbl { font-size:0.7em; color:var(--muted); margin-top:3px; }

    /* RUBRIQUES BILAN */
    .rub-bilan { display:flex; flex-direction:column; gap:8px; }
    .rub-ligne { background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:14px; padding:12px 16px; }
    .rub-haut { display:flex; align-items:center; gap:10px; margin-bottom:6px; }
    .rub-emoji { font-size:1.3em; }
    .rub-rang { width:22px; height:22px; border-radius:50%; background:rgba(255,255,255,0.12); display:flex; align-items:center; justify-content:center; font-size:0.7em; font-weight:800; color:rgba(255,255,255,0.8); flex-shrink:0; }
    .rub-nom { font-size:0.88em; font-weight:600; flex:1; }
    .rub-montant { font-size:1em; font-weight:700; }
    .rub-bar { height:5px; background:rgba(255,255,255,0.1); border-radius:99px; overflow:hidden; }
    .rub-bar-fill { height:100%; border-radius:99px; transition:width 0.8s cubic-bezier(0.22,1,0.36,1); }
    .rub-detail { font-size:0.72em; color:var(--muted); margin-top:4px; }
    .c-rouge .rub-bar-fill { background:linear-gradient(90deg,#c0392b,#e74c3c); }
    .c-orange .rub-bar-fill { background:linear-gradient(90deg,#e67e22,#f39c12); }
    .c-jaune .rub-bar-fill { background:linear-gradient(90deg,#d4a017,#f6c90e); }
    .c-vert .rub-bar-fill { background:linear-gradient(90deg,#27ae60,#2ecc71); }
    .c-bleuclair .rub-bar-fill { background:linear-gradient(90deg,#2980b9,#4fc3f7); }
    .c-indigo .rub-bar-fill { background:linear-gradient(90deg,#3f51b5,#7c4dff); }

    .top-liste { display:flex; flex-direction:column; gap:6px; }

    .sem-item { display:flex; align-items:center; gap:12px; }
    .sem-label { font-size:0.7em; font-family:'DM Mono',monospace; color:var(--muted); width:80px; flex-shrink:0; }

    .acc-etab { overflow:hidden; max-height:0; transition:max-height 0.45s cubic-bezier(0.22,1,0.36,1); background:rgba(13,15,26,0.97); border:1px solid rgba(255,255,255,0.07); border-top:none; border-radius:0 0 14px 14px; margin-bottom:8px; }
    .etab-item { display:flex; align-items:center; gap:10px; padding:8px 14px; border-bottom:1px solid rgba(255,255,255,0.05); }
    .etab-item:last-child { border-bottom:none; }
    .etab-rang { font-size:0.68em; font-weight:700; color:var(--muted); width:22px; text-align:center; flex-shrink:0; font-family:'DM Mono',monospace; }

    .etab-cat { font-size:0.7em; color:var(--muted); margin-top:1px; }

    .infos-valeur { font-size:0.88em; font-weight:600; color:var(--text); margin-top:2px; }

    .infos-edit { font-size:0.75em; color:var(--muted); flex-shrink:0; }
    /* MODALE EDIT */
    .edit-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:400; justify-content:center; align-items:flex-end; }
    .edit-overlay.actif { display:flex; }
    .edit-sheet { background:#131629; border:1px solid rgba(255,255,255,0.1); border-radius:20px 20px 0 0; padding:24px 20px 36px; width:100%; max-width:480px; margin:0 auto; }
    .edit-titre { font-size:1em; font-weight:700; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
    .edit-champ label { font-size:0.7em; font-weight:700; letter-spacing:0.8px; text-transform:uppercase; color:var(--muted); display:block; margin-bottom:5px; }
    .edit-champ input, .edit-champ select { width:100%; padding:10px 14px; border-radius:10px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.07); color:var(--text); font-family:'Outfit',sans-serif; font-size:0.92em; outline:none; margin-bottom:14px; transition:border-color 0.2s; }
    .edit-champ input:focus { border-color:rgba(108,99,255,0.5); }
    .edit-champ input::placeholder { color:var(--muted); }
    .edit-champ .mdp-wrap { position:relative; margin-bottom:14px; }
    .edit-champ .mdp-wrap input { padding-right:42px; margin-bottom:0; }
    .edit-champ .mdp-oeil { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--muted); font-size:1.1em; padding:0; }
    .edit-champ .mdp-oeil:hover { color:var(--text); }
    .edit-btns { display:flex; gap:10px; margin-top:4px; }
    .edit-btn-save { flex:1; padding:12px; border-radius:10px; border:none; background:linear-gradient(135deg,var(--accent),#8b83ff); color:white; font-family:'Outfit',sans-serif; font-size:0.92em; font-weight:700; cursor:pointer; }
    .edit-btn-cancel { padding:12px 20px; border-radius:10px; border:1px solid var(--border); background:transparent; color:var(--muted); font-family:'Outfit',sans-serif; font-size:0.92em; font-weight:600; cursor:pointer; }
    .edit-erreur { background:rgba(239,68,68,0.15); border:1px solid rgba(239,68,68,0.3); color:#fca5a5; border-radius:9px; padding:8px 12px; font-size:0.8em; margin-bottom:12px; display:none; }
    .edit-erreur.visible { display:block; }

    /* NON CONNECTÉ */
    .non-connecte { text-align:center; padding:60px 20px; max-width:400px; margin:0 auto; }
    .non-connecte .icon { font-size:3em; margin-bottom:16px; }
    .non-connecte h2 { font-size:1.2em; font-weight:700; margin-bottom:8px; }
    .non-connecte p { font-size:0.85em; color:var(--muted); margin-bottom:24px; line-height:1.6; }
    .btn-retour { display:inline-flex; align-items:center; gap:8px; padding:13px 28px; border-radius:12px; background:linear-gradient(135deg,var(--accent),#8b83ff); color:white; text-decoration:none; font-weight:600; font-size:0.92em; }
  </style>
</head>

async function getSession() {
  const { data: { session } } = await supa.auth.getSession();
  if (session) return { id: session.user.id, prenom: session.user.user_metadata?.prenom || "", nom: session.user.user_metadata?.nom || "", email: session.user.email };
  return null;
}

function getNumSem(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const j = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - j);
  const db = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return { semaine: Math.ceil((((d - db) / 86400000) + 1) / 7), annee: d.getUTCFullYear() };
}
function getCle(dateStr) {
  if (!dateStr) return null;
  const { semaine, annee } = getNumSem(new Date(dateStr));
  return annee + "-S" + String(semaine).padStart(2, "0");
}
function labelSem(cle) {
  const [a, s] = cle.split("-S");
  return "S" + parseInt(s) + " / " + a;
}

function switchOnglet(uid, mode) {
  const btnEtab = document.getElementById(`btn_etab_${uid}`);
  const btnCat  = document.getElementById(`btn_cat_${uid}`);
  const listeEtab = document.getElementById(`liste_etab_${uid}`);
  const listeCat  = document.getElementById(`liste_cat_${uid}`);
  if (mode === 'etab') {
    btnEtab.classList.add('actif'); btnCat.classList.remove('actif');
    listeEtab.style.display = ''; listeCat.style.display = 'none';
  } else {
    btnCat.classList.add('actif'); btnEtab.classList.remove('actif');
    listeCat.style.display = ''; listeEtab.style.display = 'none';
  }
}

async function toggleInfosPerso() {
  const acc = document.getElementById("infosAccordeon");
  const fleche = document.getElementById("flecheInfos");
  const ouvert = acc.style.maxHeight !== "0px" && acc.style.maxHeight !== "";
  acc.style.maxHeight = ouvert ? "0" : "99999px";
  if (fleche) fleche.style.transform = ouvert ? "rotate(0deg)" : "rotate(180deg)";
}

function switchVueRub(uid, mode) {
  const btnHisto = document.getElementById(`btn_histo_${uid}`);
  const btnClass = document.getElementById(`btn_class_${uid}`);
  const vueHisto = document.getElementById(`vue_histo_${uid}`);
  const vueClass = document.getElementById(`vue_class_${uid}`);
  if (mode === 'histo') {
    btnHisto.classList.add('actif'); btnClass.classList.remove('actif');
    vueHisto.style.display = ''; vueClass.style.display = 'none';
  } else {
    btnClass.classList.add('actif'); btnHisto.classList.remove('actif');
    vueClass.style.display = ''; vueHisto.style.display = 'none';
  }
}

async function changerPhoto(event) {
  const fichier = event.target.files[0];
  if (!fichier) return;
  if (!fichier.type.startsWith("image/")) { alert("Merci de choisir une image."); return; }

  const session = await getSession();
  if (!session) return;

  // Redimensionner l'image côté client (200x200, JPEG) pour limiter la taille
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = async () => {
      const taille = 200;
      const canvas = document.createElement("canvas");
      canvas.width = taille; canvas.height = taille;
      const ctx = canvas.getContext("2d");
      // Recadrage centré (cover)
      const ratio = Math.max(taille / img.width, taille / img.height);
      const w = img.width * ratio, h = img.height * ratio;
      ctx.drawImage(img, (taille - w) / 2, (taille - h) / 2, w, h);
      const dataUrl = canvas.toDataURL("image/jpeg", 0.85);

      const { error } = await supa.from("profils").upsert({ id: session.id, photo: dataUrl });
      if (error) { alert("Erreur lors de l'enregistrement de la photo : " + error.message); return; }

      // Mettre à jour l'affichage immédiatement
      const av = document.querySelector(".avatar-grand");
      if (av) av.innerHTML = `<img src="${dataUrl}" alt="Photo de profil"><span class="avatar-cam">📷</span>`;
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(fichier);
}

      div2.innerHTML = `<span class="top-rank">${medaillesEtab[i]}</span>
        <div class="top-info">
          <div class="top-cat">${etab}</div>
          <div class="top-date">${data.emoji || ""} ${data.rubrique || ""} · ${data.nb} dépense${data.nb>1?"s":""}</div>
        </div>
        <span class="top-montant">${data.total.toFixed(2)} €</span>`;
      topEtabListe.appendChild(div2);
    });
  }
  // ── INFOS PERSONNELLES ──
  const infosCard = document.getElementById("infosCard");

  const CHAMPS = [
    { key:"prenom",    label:"Prénom",       icone:"👤", valeur: session.prenom,          type:"text",     placeholder:"Votre prénom" },
    { key:"nom",       label:"Nom",          icone:"👤", valeur: session.nom,             type:"text",     placeholder:"Votre nom" },
    { key:"email",     label:"Email",        icone:"✉️",  valeur: session.email,           type:"email",    placeholder:"email@exemple.com" },
    { key:"age",       label:"Âge",          icone:"🎂", valeur: profil.age||"",          type:"number",   placeholder:"Votre âge" },
    { key:"ville",     label:"Ville",        icone:"📍", valeur: profil.ville||"",        type:"text",     placeholder:"Votre ville" },
    { key:"pays",      label:"Pays",         icone:"🌍", valeur: profil.pays||"",         type:"text",     placeholder:"Votre pays" },
    { key:"telephone", label:"Téléphone",    icone:"📱", valeur: profil.telephone||"",    type:"tel",      placeholder:"Votre numéro" },
    { key:"profession",label:"Profession",   icone:"💼", valeur: profil.profession||"",   type:"text",     placeholder:"Votre profession" },
    { key:"mdp",       label:"Mot de passe", icone:"🔒", valeur: "••••••••",              type:"password", placeholder:"Nouveau mot de passe" },
  ];

  CHAMPS.forEach(champ => {
    const ligne = document.createElement("div");
    ligne.className = "infos-ligne";
    const valAff = champ.valeur && champ.valeur !== "••••••••" ? champ.valeur : null;
    ligne.innerHTML = `
      <span class="infos-icone">${champ.icone}</span>
      <div class="infos-contenu">
        <div class="infos-label">${champ.label}</div>
        <div class="infos-valeur${valAff ? "" : " vide"}" id="val_${champ.key}">${valAff || "Non renseigné"}</div>
      </div>
      <span class="infos-edit">✏️</span>`;
    ligne.addEventListener("click", () => ouvrirEdit(champ));
    infosCard.appendChild(ligne);
  });
}

// ── ÉDITION INFOS ──
let champEnCours = null;

async function ouvrirEdit(champ) {
  champEnCours = champ;
  document.getElementById("editTitre").textContent = champ.icone + " Modifier — " + champ.label;
  document.getElementById("editErreur").classList.remove("visible");

  const session = await getSession();
  let valActuelle = "";
  if (["prenom","nom","email"].includes(champ.key)) {
    valActuelle = session[champ.key] || "";
  } else if (champ.key !== "mdp") {
    const { data: profilDB } = await supa.from("profils").select(champ.key).eq("id", session.id).single();
    valActuelle = (profilDB && profilDB[champ.key]) || "";
  }

  let champHTML = "";
  if (champ.key === "mdp") {
    champHTML = `<label>Nouveau mot de passe</label>
      <div class="mdp-wrap"><input type="password" id="editMdpNouv" placeholder="8 caractères minimum"><button type="button" class="mdp-oeil" onclick="toggleEditMdp('editMdpNouv',this)">👁️</button></div>
      <label>Confirmer le nouveau mot de passe</label>
      <div class="mdp-wrap" style="margin-bottom:0;"><input type="password" id="editMdpConf" placeholder="Répéter le nouveau mot de passe"><button type="button" class="mdp-oeil" onclick="toggleEditMdp('editMdpConf',this)">👁️</button></div>`;
  } else {
    champHTML = `<label>${champ.label}</label><input type="${champ.type}" id="editValeur" placeholder="${champ.placeholder}" value="${valActuelle}">`;
  }
  document.getElementById("editChampWrap").innerHTML = champHTML;
  document.getElementById("editOverlay").classList.add("actif");
  setTimeout(() => { const el = document.getElementById("editValeur") || document.getElementById("editMdpNouv"); if (el) el.focus(); }, 100);
}

function fermerEdit() {
  document.getElementById("editOverlay").classList.remove("actif");
  champEnCours = null;
}

function toggleEditMdp(id, btn) {
  const input = document.getElementById(id);
  if (!input) return;
  input.type = input.type === "password" ? "text" : "password";
  btn.textContent = input.type === "password" ? "👁️" : "🙈";
}

async function sauvegarderEdit() {
  if (!champEnCours) return;
  const session = await getSession();
  const errEl = document.getElementById("editErreur");
  errEl.classList.remove("visible");

  if (champEnCours.key === "mdp") {
    const nouv = document.getElementById("editMdpNouv").value;
    const conf = document.getElementById("editMdpConf").value;
    if (nouv.length < 8) { errEl.textContent = "Le mot de passe doit faire 8 caractères minimum."; errEl.classList.add("visible"); return; }
    if (nouv !== conf)   { errEl.textContent = "Les mots de passe ne correspondent pas."; errEl.classList.add("visible"); return; }
    const { error } = await supa.auth.updateUser({ password: nouv });
    if (error) { errEl.textContent = error.message; errEl.classList.add("visible"); return; }
    fermerEdit();
    return;
  }

  const valeur = document.getElementById("editValeur")?.value.trim();
  if (!valeur) { errEl.textContent = "Ce champ ne peut pas être vide."; errEl.classList.add("visible"); return; }

  if (["prenom","nom"].includes(champEnCours.key)) {
    await supa.auth.updateUser({ data: { [champEnCours.key]: valeur } });
    await supa.from("profils").update({ [champEnCours.key]: valeur }).eq("id", session.id);
    session[champEnCours.key] = valeur;
    localStorage.setItem("patacompta_session", JSON.stringify(session));
  } else if (champEnCours.key === "email") {
    const { error } = await supa.auth.updateUser({ email: valeur });
    if (error) { errEl.textContent = error.message; errEl.classList.add("visible"); return; }
    session.email = valeur;
    localStorage.setItem("patacompta_session", JSON.stringify(session));
  } else {
    await supa.from("profils").upsert({ id: session.id, [champEnCours.key]: valeur });
  }

  const valEl = document.getElementById("val_" + champEnCours.key);
  if (valEl) { valEl.textContent = valeur; valEl.classList.remove("vide"); }
  fermerEdit();
  // Masquer le spinner
  const overlay = document.getElementById("loadingOverlay");
  if (overlay) { overlay.classList.add("masquer"); setTimeout(() => overlay.remove(), 400); }
}

init();
</script>
